<div *ngIf="(ultimaConsulta?.updatedAt || ultimaConsulta?.createdAt) && !validacion" class="row bg-faded"
     class="d-flex justify-content-start">
    <div class="col m-0 p-0 bg-registro-anterior">
        <span>
            Registros tomados el {{ (ultimaConsulta.updatedAt || ultimaConsulta.createdAt) | fecha }},
            por
            {{ ultimaConsulta.createdBy | nombre }}</span>
    </div>
</div>

<div *ngIf="mostrarTituloSubmolecula" class="rup-submolecula-titulo mb-2" style="margin-top: 10px;">
    <span class="text-bold text-capitalize" style="font-size: 1.0rem;color:#00a8e0">{{ params?.titulo || registro?.nombre || elementoRUP?.conceptos[0]?.term }}</span>
    <hr style="border: none; height: 1px; background-color: #4a4a4a; opacity: 1;">
</div>

<ng-container #componentContainer></ng-container>

<!-- Moléculas (Fallback para cuando no hay componente específico o para renderizado recursivo) -->
<ng-container *ngIf="!rupInstance && contentLoaded && elementoRUP.requeridos && elementoRUP.requeridos.length">
    <div class="row" [ngClass]="{'d-flex justify-content-start': soloValores}">
        <ng-container *ngFor="let item of requeridos; let i = index">
            <div *ngIf="item.elementoRUP"
                 class="col-{{ item.style.columns }} mr-{{ item.style?.offset ? item.style.offset : '0' }}">
                <rup [elementoRUP]="item.elementoRUP" [paciente]="paciente" [params]="item.params"
                     [prestacion]="prestacion" [registro]="registro.registros[i]" [soloValores]="soloValores"
                     [style]="item.style" (change)="emitChange($event)" [conceptosAsociados]="conceptosAsociados">
                </rup>
            </div>
        </ng-container>
    </div>
</ng-container>
